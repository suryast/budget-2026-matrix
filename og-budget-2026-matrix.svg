<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Australia's Budget 2026 Matrix</title>
  <desc id="desc">Social share image for the Budget 2026 CGT and negative gearing matrix.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf8f1"/>
      <stop offset="100%" stop-color="#efe7da"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#171411" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="34" y="34" width="1132" height="562" rx="30" fill="#fffdf8" stroke="#1f1a14" stroke-width="3" filter="url(#shadow)"/>

  <rect x="86" y="86" width="222" height="38" rx="19" fill="#d8eee6" stroke="#9bc9ba" stroke-width="2"/>
  <text x="197" y="111" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="17" font-weight="700" letter-spacing="2.4" fill="#0f5542">AUSTRALIA'S BUDGET 2026</text>

  <text x="86" y="188" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="58" font-weight="700" fill="#171411">CGT &amp; Negative</text>
  <text x="86" y="250" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="58" font-weight="700" fill="#171411">Gearing Matrix</text>

  <text x="88" y="316" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="26" fill="#5d574f">
